<!-- WINE / BEER / NON-ALCOHOLIC (updated) -->
<div class="menuCard wineBeerCard" data-card="winebeer">
  <div class="menuCard__head">
    <div class="menuCard__title">WINE / BEER / NON-ALCOHOLIC</div>

    <div class="tierTabs">
      <button class="chip tierBtn" type="button" data-tier="wine">$6 Wine</button>
      <button class="chip tierBtn" type="button" data-tier="beer">$4 Beer</button>
      <button class="chip tierBtn" type="button" data-tier="na">Non-Alcoholic</button>
    </div>
  </div>

  <!-- WINE LIST (shows only when you click $6 Wine) -->
  <div class="tierPanel hidden" data-panel="wine">
    <div class="itemChips">
      <span class="chip">Cabernet Sauvignon</span>
      <span class="chip">Chardonnay</span>
      <span class="chip">Merlot</span>
      <span class="chip">Moscato (Red/White)</span>
      <span class="chip">Pinot Grigio</span>
      <span class="chip">Sauvignon Blanc</span>
      <span class="chip">Sweet Red</span>
    </div>
  </div>

  <!-- BEER LIST (shows only when you click $4 Beer) -->
  <div class="tierPanel hidden" data-panel="beer">
    <div class="itemChips">
      <span class="chip">Angry Orchard</span>
      <span class="chip">Corona</span>
      <span class="chip">Guinness</span>
      <span class="chip">Heineken</span>
      <span class="chip">Modelo</span>
      <span class="chip">Stella</span>
      <span class="chip">Goose Island IPA</span>
      <span class="chip">Voodoo Ranger IPA</span>
    </div>
  </div>

  <!-- NON-ALCOHOLIC (shows by default) -->
  <div class="tierPanel" data-panel="na">
    <div class="itemChips">
      <span class="chip">$5 Red Bull</span>
      <span class="chip">$5 Ginger Beer</span>
      <span class="chip">$5 Frozen Drinks</span>
      <span class="chip">$3 Soda</span>
      <span class="chip">$3 Juice</span>
      <span class="chip">$3 Water</span>
    </div>
  </div>
</div>
