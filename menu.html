<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu • Allure Bar & Lounge</title>

  <style>
    :root{
      --bg:#070707;
      --panel:#0e0f12;
      --text:#f3f3f3;
      --muted:#b9b9b9;
      --gold:#d7b56d;
      --gold2:#f2d28a;
      --line:rgba(215,181,109,.22);
      --shadow: 0 0 22px rgba(215,181,109,.18);
      --shadow-strong: 0 0 26px rgba(242,210,138,.35), 0 0 60px rgba(215,181,109,.20);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(900px 500px at 15% 30%, rgba(0,140,90,.18), transparent 55%),
                  radial-gradient(900px 500px at 80% 40%, rgba(215,181,109,.12), transparent 55%),
                  var(--bg);
    }

    a{color:inherit;text-decoration:none}
    .container{max-width:1150px;margin:0 auto;padding:18px 16px 60px}

    /* ---------- Sticky Header ---------- */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.72);
      position:sticky;top:0;z-index:50;
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
    .dot{width:9px;height:9px;border-radius:99px;background:var(--gold);box-shadow:0 0 14px rgba(215,181,109,.55)}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;border-radius:999px;
      border:1px solid rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.20), rgba(215,181,109,.08));
      font-weight:700;
      white-space:nowrap;
    }
    .btn:hover{box-shadow:var(--shadow)}
    .btn.primary{
      border-color: rgba(215,181,109,.75);
      background: linear-gradient(180deg, rgba(242,210,138,.28), rgba(215,181,109,.10));
    }

    /* ---------- Day Bar ---------- */
    .daybarWrap{
      margin-top:16px;
      border:1px solid rgba(215,181,109,.18);
      background:rgba(10,10,12,.55);
      border-radius: var(--radius);
      padding:12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .daybar{display:flex;gap:10px;flex-wrap:wrap}
    @media (max-width: 720px){
      .daybar{
        flex-wrap:nowrap;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        scroll-snap-type:x mandatory;
        padding-bottom:4px;
      }
      .daybar::-webkit-scrollbar{height:6px}
      .daybar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}
    }

    .daytab{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35);
      font-weight:700;
      color:#f0f0f0;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
    }
    @media (max-width: 720px){ .daytab{scroll-snap-align:start} }
    .daytab:hover{transform:translateY(-1px);border-color:rgba(215,181,109,.35)}
    .daytab.active{
      color:#14120c;
      background: linear-gradient(180deg, rgba(242,210,138,.95), rgba(215,181,109,.85));
      border-color: rgba(242,210,138,.95);
      box-shadow: var(--shadow-strong);
    }

    /* ---------- Day Sections ---------- */
    .day-section{display:none;margin-top:16px}
    .day-section.active{display:block}

    .sectionCard{
      border:1px solid rgba(215,181,109,.20);
      background: linear-gradient(180deg, rgba(18,18,22,.62), rgba(10,10,12,.58));
      border-radius: var(--radius);
      padding:18px;
      box-shadow: 0 14px 50px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .sectionHead{display:flex;flex-direction:column;gap:6px}
    .sectionTitle{margin:0;font-size:28px;letter-spacing:.6px;text-transform:uppercase}
    .sectionSub{margin:0;color:var(--muted);line-height:1.35;max-width:70ch}

    /* ---------- Grid Cards ---------- */
    .grid{display:grid;gap:14px;margin-top:16px}
    .grid.two{grid-template-columns:1fr 1fr}
    @media (max-width: 860px){ .grid.two{grid-template-columns:1fr} }

    .miniCard{
      border:1px solid rgba(215,181,109,.18);
      background: rgba(0,0,0,.35);
      border-radius: 16px;
      padding:14px;
      position:relative;
    }
    .miniCard h3{
      margin:0 0 10px 0;
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#f7f1e3;
    }

    /* Pills */
    .pills{display:flex;flex-wrap:wrap;gap:10px}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(215,181,109,.26);
      background: rgba(14,14,18,.55);
      color:#f2f2f2;
      font-weight:650;
      font-size:13px;
      line-height:1;
      white-space:nowrap;
      cursor:pointer;
    }
    .pill:hover{box-shadow:var(--shadow);border-color:rgba(242,210,138,.42)}
    .pill.active{
      color:#14120c;
      background: linear-gradient(180deg, rgba(242,210,138,.95), rgba(215,181,109,.85));
      border-color: rgba(242,210,138,.95);
      box-shadow: var(--shadow-strong);
    }

    /* Rows list */
    .rows{display:flex;flex-direction:column;gap:10px;margin-top:10px}
    .row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:10px 12px;border-radius:14px;
      border:1px solid rgba(215,181,109,.18);
      background: rgba(12,12,16,.55);
    }
    .row .name{font-weight:750}
    .row .price{font-weight:900;color:var(--gold2)}
    .hidden{display:none !important}

    /* ===== Spirits Tier Box (your drawing layout) ===== */
    .tierTop{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 10px}
    .tierMid{display:flex;justify-content:center;margin:6px 0 8px}
    .tierBtn{appearance:none;border:none}
    .tierBtn.pill{border:1px solid rgba(215,181,109,.26)}
    .tierBtn.pill.active{border-color:rgba(242,210,138,.95)}

    .spiritsWrap{margin-top:10px}
    .catBlock{margin-top:12px}
    .catTitle{
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:#f7f1e3;
      font-size:12px;
      margin:0 0 8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      opacity:.95;
    }
    .catTitle .catPrice{
      color: var(--gold2);
      font-weight:950;
      letter-spacing:.02em;
    }

    /* Wine/Beer/NA tabs inside card */
    .tabRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
    .tabPanel{margin-top:10px}

    /* Make titles not hide behind sticky header when scrolling */
    .day-section{scroll-margin-top: 140px;}
  </style>
</head>

  <script>
    (function(){
      const tabs = Array.from(document.querySelectorAll('.daytab'));
      const sections = Array.from(document.querySelectorAll('.day-section'));

      const tplSunMon = document.getElementById('tpl-sunmon');
      const tplHappy = document.getElementById('tpl-happyhour');

      // Inject templates into each section
      sections.forEach(sec => {
        const content = sec.querySelector('.dayContent');
        content.innerHTML = '';
        const which = (sec.dataset.template || '').toLowerCase();
        const tpl = which === 'happyhour' ? tplHappy : tplSunMon;
        content.appendChild(tpl.content.cloneNode(true));

        sec.querySelector('.sectionTitle').textContent = sec.dataset.title || '';
        sec.querySelector('.sectionSub').textContent = sec.dataset.subtitle || '';
      });

      // Scroll with offset so title shows under sticky header
      function scrollToSection(sec){
        const headerOffset = 130; // adjust if needed
        const rect = sec.getBoundingClientRect();
        const y = rect.top + window.pageYOffset - headerOffset;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }

      function activate(dayId, {scrollToTop=true} = {}){
        const sec = document.getElementById(dayId);
        if(!sec) return;

        tabs.forEach(t => t.classList.toggle('active', t.dataset.target === dayId));
        sections.forEach(s => s.classList.toggle('active', s.id === dayId));

        try { localStorage.setItem('activeDay', dayId); } catch(e){}
        if(location.hash !== '#' + dayId){
          history.replaceState(null, '', '#' + dayId);
        }

        if(scrollToTop) scrollToSection(sec);
      }

      tabs.forEach(btn => btn.addEventListener('click', () => activate(btn.dataset.target)));

      const fromHash = (location.hash || '').replace('#','').trim();
      let start = fromHash;
      if(!start){
        try { start = localStorage.getItem('activeDay') || ''; } catch(e){}
      }
      if(!start) start = 'monday';
      activate(start, {scrollToTop:false});
    })();
  </script>

  <script>
    // Tabs system for mini cards (Wine/Beer/NA etc) - scoped per card (no ID conflicts)
    document.addEventListener('click', function(e){
      const btn = e.target.closest('.jsTabBtn');
      if(!btn) return;

      const card = btn.closest('.jsTabsCard');
      if(!card) return;

      const tab = btn.dataset.tab;

      card.querySelectorAll('.jsTabBtn').forEach(b => b.classList.toggle('active', b === btn));
      card.querySelectorAll('.jsTabPanel').forEach(p => {
        p.classList.toggle('hidden', p.dataset.panel !== tab);
      });
    });

    // Set defaults for each tabs card after templates injected
    (function(){
      document.querySelectorAll('.jsTabsCard').forEach(card => {
        const def = card.dataset.default;
        const btn = def ? card.querySelector('.jsTabBtn[data-tab="'+def+'"]') : card.querySelector('.jsTabBtn');
        if(btn) btn.click();
      });
    })();

    // Spirits tier system ($5 shots / $10 drinks / $10 cocktails)
    document.addEventListener("click", function (e) {
      const btn = e.target.closest(".tierBtn");
      if (!btn) return;

      const card = btn.closest(".hhSpiritsCard");
      if (!card) return;

      card.querySelectorAll(".tierBtn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      const spiritsWrap = card.querySelector(".spiritsWrap");
      const cocktailsWrap = card.querySelector(".cocktailsWrap");

      // Cocktails
      if (btn.dataset.tier === "cocktails10") {
        if (spiritsWrap) spiritsWrap.classList.add("hidden");
        if (cocktailsWrap) cocktailsWrap.classList.remove("hidden");
        return;
      }

      // Spirits
      if (cocktailsWrap) cocktailsWrap.classList.add("hidden");
      if (spiritsWrap) spiritsWrap.classList.remove("hidden");

      const price = (btn.dataset.tier === "drinks10") ? "$10" : "$5";
      card.querySelectorAll(".jsSpiritPrice").forEach(p => p.textContent = price);
    });
  </script>
