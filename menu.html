<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu • Allure Bar & Lounge</title>

  <style>
    :root{
      --bg:#070707;
      --panel:#0e0f12;
      --panel2:#0b0c0f;
      --text:#f3f3f3;
      --muted:#b9b9b9;
      --gold:#d7b56d;
      --gold2:#f2d28a;
      --line:rgba(215,181,109,.22);
      --shadow: 0 0 22px rgba(215,181,109,.18);
      --shadow-strong: 0 0 26px rgba(242,210,138,.35), 0 0 60px rgba(215,181,109,.20);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background: radial-gradient(900px 500px at 15% 30%, rgba(0,140,90,.18), transparent 55%),
                  radial-gradient(900px 500px at 80% 40%, rgba(215,181,109,.12), transparent 55%),
                  var(--bg);
    }

    a{color:inherit;text-decoration:none}
    .container{max-width:1150px;margin:0 auto;padding:18px 16px 60px}

    /* ---------- Top Nav (simple) ---------- */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 16px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.55);
      position:sticky;top:0;z-index:20;
      backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
    .dot{width:9px;height:9px;border-radius:99px;background:var(--gold);box-shadow:0 0 14px rgba(215,181,109,.55)}
    .navright{display:flex;align-items:center;gap:10px}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;border-radius:999px;
      border:1px solid rgba(215,181,109,.45);
      background: linear-gradient(180deg, rgba(215,181,109,.20), rgba(215,181,109,.08));
      box-shadow:0 0 0 rgba(0,0,0,0);
      font-weight:700;
      white-space:nowrap;
    }
    .btn:hover{box-shadow:var(--shadow)}
    .btn.primary{
      border-color: rgba(215,181,109,.75);
      background: linear-gradient(180deg, rgba(242,210,138,.28), rgba(215,181,109,.10));
    }

    /* ---------- Day Bar ---------- */
    .daybarWrap{
      margin-top:16px;
      border:1px solid rgba(215,181,109,.18);
      background:rgba(10,10,12,.55);
      border-radius: var(--radius);
      padding:12px;
      box-shadow: 0 12px 40px rgba(0,0,0,.25);
    }
    .daybar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;   /* <-- allows 2-3 lines on desktop */
    }

    /* Phone: becomes horizontal snap scroller */
    @media (max-width: 720px){
      .daybar{
        flex-wrap:nowrap;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
        scroll-snap-type:x mandatory;
        padding-bottom:4px;
      }
      .daybar::-webkit-scrollbar{height:6px}
      .daybar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px}
    }

    .daytab{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35);
      font-weight:700;
      color:#f0f0f0;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease, background .12s ease;
    }
    @media (max-width: 720px){
      .daytab{scroll-snap-align:start}
    }
    .daytab:hover{transform:translateY(-1px);border-color:rgba(215,181,109,.35)}
    .daytab.active{
      color:#14120c;
      background: linear-gradient(180deg, rgba(242,210,138,.95), rgba(215,181,109,.85));
      border-color: rgba(242,210,138,.95);
      box-shadow: var(--shadow-strong); /* stronger gold glow */
    }

    /* ---------- Day Sections ---------- */
    .day-section{display:none;margin-top:16px}
    .day-section.active{display:block}

    .sectionCard{
      border:1px solid rgba(215,181,109,.20);
      background: linear-gradient(180deg, rgba(18,18,22,.62), rgba(10,10,12,.58));
      border-radius: var(--radius);
      padding:18px;
      box-shadow: 0 14px 50px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .sectionCard:before{
      content:"";
      position:absolute;inset:-120px -200px auto auto;
      width:380px;height:380px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,160,110,.24), transparent 60%);
      filter: blur(2px);
      pointer-events:none;
    }

    .sectionHead{display:flex;flex-direction:column;gap:6px}
    .sectionTitle{
      margin:0;
      font-size:28px;
      letter-spacing:.6px;
      text-transform:uppercase;
    }
    .sectionSub{
      margin:0;
      color:var(--muted);
      line-height:1.35;
      max-width: 70ch;
    }

    /* ---------- Mini Luxury Cards ---------- */
    .grid{
      display:grid;
      gap:14px;
      margin-top:16px;
    }
    .grid.two{grid-template-columns:1fr 1fr}
    @media (max-width: 860px){ .grid.two{grid-template-columns:1fr} }

    .miniCard{
      border:1px solid rgba(215,181,109,.18);
      background: rgba(0,0,0,.35);
      border-radius: 16px;
      padding:14px;
      position:relative;
    }
    .miniCard h3{
      margin:0 0 10px 0;
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#f7f1e3;
    }
    .pills{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(215,181,109,.26);
      background: rgba(14,14,18,.55);
      color:#f2f2f2;
      font-weight:650;
      font-size:13px;
      line-height:1;
      white-space:nowrap;
    }
    .pill strong{color:var(--gold2);font-weight:800;margin-left:8px}
    .pill:hover{box-shadow: var(--shadow); border-color: rgba(242,210,138,.42)}

    /* “dense” list row style for priced items */
    .rows{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(215,181,109,.18);
      background: rgba(12,12,16,.55);
    }
    .row .name{font-weight:750}
    .row .price{font-weight:900;color:var(--gold2)}
  </style>
</head>

  <script>
    (function(){
      const tabs = Array.from(document.querySelectorAll('.daytab'));
      const sections = Array.from(document.querySelectorAll('.day-section'));

      // Inject templates (avoid repeats)
      const tplSunMon = document.getElementById('tpl-sunmon');
      const tplHappy = document.getElementById('tpl-happyhour');

      sections.forEach(sec => {
        const content = sec.querySelector('.dayContent');
        content.innerHTML = ''; // clean
        const which = (sec.dataset.template || '').toLowerCase();
        const tpl = which === 'happyhour' ? tplHappy : tplSunMon;
        content.appendChild(tpl.content.cloneNode(true));

        // Fill title/subtitle
        sec.querySelector('.sectionTitle').textContent = sec.dataset.title || '';
        sec.querySelector('.sectionSub').textContent = sec.dataset.subtitle || '';
      });

      function activate(dayId, {scrollToTop=true} = {}){
        // safety: ignore bad id
        const sec = document.getElementById(dayId);
        if(!sec) return;

        // tabs
        tabs.forEach(t => t.classList.toggle('active', t.dataset.target === dayId));

        // sections
        sections.forEach(s => s.classList.toggle('active', s.id === dayId));

        // remember selection
        try { localStorage.setItem('activeDay', dayId); } catch(e){}

        // keep URL hash synced (optional, helps share link)
        if(location.hash !== '#' + dayId){
          history.replaceState(null, '', '#' + dayId);
        }

        // optional: scroll to top of content
        if(scrollToTop){
          sec.scrollIntoView({behavior:'smooth', block:'start'});
        }
      }

      // click handlers
      tabs.forEach(btn => {
        btn.addEventListener('click', () => activate(btn.dataset.target));
      });

      // initial day: hash > localStorage > monday
      const fromHash = (location.hash || '').replace('#','').trim();
      let start = fromHash;
      if(!start){
        try { start = localStorage.getItem('activeDay') || ''; } catch(e){}
      }
      if(!start) start = 'monday';

      // IMPORTANT: Show only selected day on load
      activate(start, {scrollToTop:false});
    })();
  </script>
  
  <script>
  (function(){
      const tabs = Array.from(document.querySelectorAll('.daytab'));
      const sections = Array.from(document.querySelectorAll('.day-section'));

      function activate(dayId){
          tabs.forEach(t => t.classList.toggle('active', t.dataset.target === dayId));
          sections.forEach(s => s.classList.toggle('active', s.id === dayId));
          localStorage.setItem('activeDay', dayId);
      }

      tabs.forEach(btn => {
          btn.addEventListener('click', () => activate(btn.dataset.target));
      });

      activate('monday');

  })();

  /* =========================
     FILTER SYSTEM (ADD HERE)
  ========================== */

  document.addEventListener("click", function(e){
    if(e.target.classList.contains("filterBtn")){
      
      const container = e.target.closest(".miniCard");
      const buttons = container.querySelectorAll(".filterBtn");
      const sections = container.querySelectorAll(".filterSection");

      buttons.forEach(btn => btn.classList.remove("active"));
      sections.forEach(sec => sec.classList.remove("active"));

      e.target.classList.add("active");

      const target = container.querySelector("#" + e.target.dataset.filter);
      if(target){
        target.classList.add("active");
      }
    }
  });

</script>
