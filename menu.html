<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu • Allure Bar & Lounge</title>

<style>
:root{
  --bg:#070707;
  --card:#111114;
  --gold:#d7b56d;
  --gold2:#f2d28a;
  --text:#f3f3f3;
  --muted:#b9b9b9;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}
.container{max-width:1100px;margin:auto;padding:20px}

/* Pills */
.pill{
  padding:8px 12px;
  border-radius:999px;
  border:1px solid rgba(215,181,109,.3);
  background:#141418;
  color:#fff;
  cursor:pointer;
  font-weight:600;
  font-size:13px;
}
.pill.active{
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#14120c;
}

/* Card */
.card{
  background:var(--card);
  padding:18px;
  border-radius:18px;
  margin-bottom:20px;
}

/* Rows */
.rows{margin-top:12px}
.row{
  display:flex;
  justify-content:space-between;
  padding:8px 10px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.price{font-weight:900;color:var(--gold2)}

.hidden{display:none}

/* Layout */
.topRow{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
.midRow{display:flex;justify-content:center;margin-top:10px}
.spiritTabs{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.spiritPanel{margin-top:12px}
h3{margin:0 0 10px 0;text-transform:uppercase;font-size:14px;letter-spacing:.2em}
</style>
</head>

<body>
<div class="container">

<div class="card hhSpiritsCard">
<h3>$5 SHOTS / $10 DRINKS</h3>

<div class="topRow">
  <button class="pill tierBtn" data-tier="shots5">$5 SHOTS</button>
  <button class="pill tierBtn" data-tier="drinks10">$10 DRINKS</button>
</div>

<div class="midRow">
  <button class="pill tierBtn" data-tier="cocktails10">$10 COCKTAILS</button>
</div>

<!-- SPIRITS -->
<div class="spiritsWrap hidden">

  <div class="spiritTabs">
    <button class="pill spiritBtn" data-spirit="vodka">Vodka</button>
    <button class="pill spiritBtn" data-spirit="tequila">Tequila</button>
    <button class="pill spiritBtn" data-spirit="whiskey">Whiskey</button>
    <button class="pill spiritBtn" data-spirit="rum">Rum</button>
    <button class="pill spiritBtn" data-spirit="gin">Gin</button>
    <button class="pill spiritBtn" data-spirit="cognac">Cognac</button>
  </div>

  <!-- Vodka -->
  <div class="spiritPanel hidden" data-panel="vodka">
    <div class="rows">
      <div class="row"><span>Absolut</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Belvedere</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Ciroc</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Grey Goose</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <!-- Tequila -->
  <div class="spiritPanel hidden" data-panel="tequila">
    <div class="rows">
      <div class="row"><span>1800</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Espolon</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Teremana</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <!-- Whiskey -->
  <div class="spiritPanel hidden" data-panel="whiskey">
    <div class="rows">
      <div class="row"><span>Jack Daniels</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Jameson</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <!-- Rum -->
  <div class="spiritPanel hidden" data-panel="rum">
    <div class="rows">
      <div class="row"><span>Bacardi</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Captain Morgan</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <!-- Gin -->
  <div class="spiritPanel hidden" data-panel="gin">
    <div class="rows">
      <div class="row"><span>Bombay</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Tanqueray</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <!-- Cognac -->
  <div class="spiritPanel hidden" data-panel="cognac">
    <div class="rows">
      <div class="row"><span>Hennessy</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Courvoisier</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

</div>

<!-- COCKTAILS -->
<div class="cocktailsWrap hidden">
  <div class="rows">
    <div class="row"><span>Long Island</span><span>$10</span></div>
    <div class="row"><span>Lemon Drop</span><span>$10</span></div>
    <div class="row"><span>Margarita</span><span>$10</span></div>
  </div>
</div>

</div>

</div>

<script>
document.addEventListener("click", function(e){

  const tierBtn = e.target.closest(".tierBtn");
  const spiritBtn = e.target.closest(".spiritBtn");
  const card = e.target.closest(".hhSpiritsCard");
  if(!card) return;

  const spiritsWrap = card.querySelector(".spiritsWrap");
  const cocktailsWrap = card.querySelector(".cocktailsWrap");

  // Tier Buttons
  if(tierBtn){
    card.querySelectorAll(".tierBtn").forEach(b=>b.classList.remove("active"));
    tierBtn.classList.add("active");

    if(tierBtn.dataset.tier === "cocktails10"){
      spiritsWrap.classList.add("hidden");
      cocktailsWrap.classList.remove("hidden");
      return;
    }

    cocktailsWrap.classList.add("hidden");
    spiritsWrap.classList.remove("hidden");

    const price = tierBtn.dataset.tier === "drinks10" ? "$10" : "$5";
    card.querySelectorAll(".jsSpiritPrice").forEach(p=>p.textContent=price);

    card.querySelectorAll(".spiritPanel").forEach(p=>p.classList.add("hidden"));
    card.querySelectorAll(".spiritBtn").forEach(b=>b.classList.remove("active"));
  }

  // Spirit Category Buttons
  if(spiritBtn){
    card.querySelectorAll(".spiritBtn").forEach(b=>b.classList.remove("active"));
    spiritBtn.classList.add("active");

    const target = spiritBtn.dataset.spirit;
    card.querySelectorAll(".spiritPanel").forEach(panel=>{
      panel.classList.toggle("hidden", panel.dataset.panel !== target);
    });
  }

});
</script>

</body>
</html>
