<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Allure Menu</title>

<style>
:root{
  --bg:#070707;
  --panel:#111114;
  --gold:#d7b56d;
  --gold2:#f2d28a;
  --text:#f3f3f3;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  background:var(--bg);
  color:var(--text);
}
.container{max-width:1100px;margin:auto;padding:20px}
.card{
  background:var(--panel);
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}
h3{
  margin:0 0 15px 0;
  font-size:14px;
  letter-spacing:.2em;
  text-transform:uppercase;
}

/* Pills */
.pill{
  padding:8px 14px;
  border-radius:999px;
  border:1px solid rgba(215,181,109,.35);
  background:#141418;
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.25s;
}
.pill.active{
  background:linear-gradient(180deg,var(--gold2),var(--gold));
  color:#14120c;
  box-shadow:0 0 18px rgba(215,181,109,.35);
}
.topRow{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
.midRow{display:flex;justify-content:center;margin-top:12px}
.spiritTabs{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.spiritPanel{margin-top:14px}
.hidden{display:none}

/* Rows */
.rows{margin-top:10px}
.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.row:last-child{border-bottom:none}
.price{font-weight:900;color:var(--gold2)}
</style>
</head>

<body>
<div class="container">

<!-- =========================
     $5 / $10 / $10 COCKTAILS
========================= -->
<div class="card hhSpiritsCard">
<h3>$5 SHOTS / $10 DRINKS</h3>

<div class="topRow">
  <button class="pill tierBtn" data-tier="shots5">$5 SHOTS</button>
  <button class="pill tierBtn" data-tier="drinks10">$10 DRINKS</button>
</div>

<div class="midRow">
  <button class="pill tierBtn" data-tier="cocktails10">$10 COCKTAILS</button>
</div>

<div class="spiritsWrap hidden">

  <div class="spiritTabs">
    <button class="pill spiritBtn" data-spirit="vodka">Vodka</button>
    <button class="pill spiritBtn" data-spirit="tequila">Tequila</button>
    <button class="pill spiritBtn" data-spirit="whiskey">Whiskey</button>
    <button class="pill spiritBtn" data-spirit="rum">Rum</button>
    <button class="pill spiritBtn" data-spirit="gin">Gin</button>
    <button class="pill spiritBtn" data-spirit="cognac">Cognac</button>
  </div>

  <div class="spiritPanel hidden" data-panel="vodka">
    <div class="rows">
      <div class="row"><span>Absolut</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Grey Goose</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="tequila">
    <div class="rows">
      <div class="row"><span>Espolon</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Teremana</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="whiskey">
    <div class="rows">
      <div class="row"><span>Jameson</span><span class="price jsSpiritPrice">$5</span></div>
      <div class="row"><span>Jack Daniels</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="rum">
    <div class="rows">
      <div class="row"><span>Bacardi</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="gin">
    <div class="rows">
      <div class="row"><span>Bombay</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="cognac">
    <div class="rows">
      <div class="row"><span>Hennessy</span><span class="price jsSpiritPrice">$5</span></div>
    </div>
  </div>

</div>

<div class="cocktailsWrap hidden">
  <div class="rows">
    <div class="row"><span>Long Island</span><span>$10</span></div>
    <div class="row"><span>Lemon Drop</span><span>$10</span></div>
    <div class="row"><span>Margarita</span><span>$10</span></div>
  </div>
</div>
</div>

<!-- =========================
     $7 / $14 TOP SHELF
========================= -->
<div class="card topShelfCard">
<h3>$7 SHOTS / $14 DRINKS</h3>

<div class="topRow">
  <button class="pill topTierBtn" data-tier="shots7">$7 SHOTS</button>
  <button class="pill topTierBtn" data-tier="drinks14">$14 DRINKS</button>
</div>

<div class="topSpiritsWrap hidden">

  <div class="spiritTabs">
    <button class="pill topSpiritBtn" data-spirit="tequila">Tequila</button>
    <button class="pill topSpiritBtn" data-spirit="whiskey">Whiskey</button>
    <button class="pill topSpiritBtn" data-spirit="gin">Gin</button>
    <button class="pill topSpiritBtn" data-spirit="cognac">Cognac</button>
  </div>

  <div class="spiritPanel hidden" data-panel="tequila">
    <div class="rows">
      <div class="row"><span>Don Julio</span><span class="price jsTopPrice">$7</span></div>
      <div class="row"><span>Patron</span><span class="price jsTopPrice">$7</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="whiskey">
    <div class="rows">
      <div class="row"><span>Old Forester</span><span class="price jsTopPrice">$7</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="gin">
    <div class="rows">
      <div class="row"><span>Hendricks</span><span class="price jsTopPrice">$7</span></div>
    </div>
  </div>

  <div class="spiritPanel hidden" data-panel="cognac">
    <div class="rows">
      <div class="row"><span>Dusse</span><span class="price jsTopPrice">$7</span></div>
      <div class="row"><span>Remy VSOP</span><span class="price jsTopPrice">$7</span></div>
    </div>
  </div>

</div>
</div>

</div>

<script>
document.addEventListener("click", function(e){

  // ===== REGULAR SPIRITS =====
  const card = e.target.closest(".hhSpiritsCard");
  if(card){

    const tierBtn = e.target.closest(".tierBtn");
    const spiritBtn = e.target.closest(".spiritBtn");

    const spiritsWrap = card.querySelector(".spiritsWrap");
    const cocktailsWrap = card.querySelector(".cocktailsWrap");

    if(tierBtn){
      card.querySelectorAll(".tierBtn").forEach(b=>b.classList.remove("active"));
      tierBtn.classList.add("active");

      if(tierBtn.dataset.tier === "cocktails10"){
        spiritsWrap.classList.add("hidden");
        cocktailsWrap.classList.remove("hidden");
        return;
      }

      cocktailsWrap.classList.add("hidden");
      spiritsWrap.classList.remove("hidden");

      const price = tierBtn.dataset.tier === "drinks10" ? "$10" : "$5";
      card.querySelectorAll(".jsSpiritPrice").forEach(p=>p.textContent=price);

      card.querySelectorAll(".spiritPanel").forEach(p=>p.classList.add("hidden"));
      card.querySelectorAll(".spiritBtn").forEach(b=>b.classList.remove("active"));
    }

    if(spiritBtn){
      card.querySelectorAll(".spiritBtn").forEach(b=>b.classList.remove("active"));
      spiritBtn.classList.add("active");

      const target = spiritBtn.dataset.spirit;
      card.querySelectorAll(".spiritPanel").forEach(panel=>{
        panel.classList.toggle("hidden", panel.dataset.panel !== target);
      });
    }
  }

  // ===== TOP SHELF =====
  const topCard = e.target.closest(".topShelfCard");
  if(topCard){

    const tierBtn = e.target.closest(".topTierBtn");
    const spiritBtn = e.target.closest(".topSpiritBtn");
    const wrap = topCard.querySelector(".topSpiritsWrap");

    if(tierBtn){
      topCard.querySelectorAll(".topTierBtn").forEach(b=>b.classList.remove("active"));
      tierBtn.classList.add("active");
      wrap.classList.remove("hidden");

      const price = tierBtn.dataset.tier === "drinks14" ? "$14" : "$7";
      topCard.querySelectorAll(".jsTopPrice").forEach(p=>p.textContent=price);

      topCard.querySelectorAll(".spiritPanel").forEach(p=>p.classList.add("hidden"));
      topCard.querySelectorAll(".topSpiritBtn").forEach(b=>b.classList.remove("active"));
    }

    if(spiritBtn){
      topCard.querySelectorAll(".topSpiritBtn").forEach(b=>b.classList.remove("active"));
      spiritBtn.classList.add("active");

      const target = spiritBtn.dataset.spirit;
      topCard.querySelectorAll(".spiritPanel").forEach(panel=>{
        panel.classList.toggle("hidden", panel.dataset.panel !== target);
      });
    }
  }

});
</script>

</body>
</html>
